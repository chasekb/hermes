name: verification

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  repo-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate research notes and skill artifacts
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path('.')
          required = [
              root / '.github/workflows/verification.yml',
              root / 'notes/Research/Agents/Skill Curation.md',
              root / 'notes/Research/Agents/Agents Research Index.md',
              root / 'notes/Research/Research Workflow.md',
              root / 'skills/software-development/workflow-skill-curation/SKILL.md',
              root / 'skills/software-development/workflow-skill-curation/references/skillify-rubric.md',
          ]
          missing = [str(path) for path in required if not path.exists()]
          if missing:
              raise SystemExit('Missing expected files: ' + ', '.join(missing))

          checks = {
              'notes/Research/Agents/Skill Curation.md': [
                  '# Skill Curation',
                  '## Search queries used',
                  '## Sources reviewed',
                  '## Should we skill-ify it? rubric',
              ],
              'notes/Research/Agents/Agents Research Index.md': [
                  '# Agents Research Index',
                  '[[Skill Curation]]',
              ],
              'skills/software-development/workflow-skill-curation/SKILL.md': [
                  '# Workflow Skill Curation',
                  '## Decision Rule',
                  'references/skillify-rubric.md',
              ],
              'skills/software-development/workflow-skill-curation/references/skillify-rubric.md': [
                  '# Should We Skill-ify It? Rubric',
                  '9-12: skillify',
                  '0-4: do not skillify yet',
              ],
          }

          for relpath, needles in checks.items():
              text = (root / relpath).read_text(encoding='utf-8')
              for needle in needles:
                  if needle not in text:
                      raise SystemExit(f'{relpath} missing expected text: {needle!r}')

          print('verification-ok')
          PY
